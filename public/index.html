<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyRoute Airlines — Flight Status Board</title>
  <style>
    :root {
      --navy: #0a1628;
      --navy-light: #132240;
      --navy-mid: #1a2d4a;
      --gold: #d4a843;
      --gold-dim: #b8922e;
      --white: #f0f0f0;
      --gray: #6b7a8d;
      --green: #2ecc71;
      --yellow: #f1c40f;
      --blue: #3498db;
      --red: #e74c3c;
      --gray-status: #7f8c8d;
      --panel-bg: #0d1d35;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'SF Pro Display', -apple-system, sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Header ─────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, var(--navy-light), var(--navy-mid));
      border-bottom: 2px solid var(--gold);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-brand .logo {
      font-size: 2rem;
      color: var(--gold);
      font-weight: 800;
      letter-spacing: 2px;
    }

    .header-brand .subtitle {
      font-size: 0.85rem;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .connection-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--gray);
    }

    .connection-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
    }

    .connection-dot.connected { background: var(--green); }

    .clock {
      font-size: 1.5rem;
      font-weight: 300;
      color: var(--gold);
      font-variant-numeric: tabular-nums;
    }

    .admin-btn {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 0.5rem 1.2rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    .admin-btn:hover {
      background: var(--gold);
      color: var(--navy);
    }

    /* ── Toolbar ─────────────────────────────────── */
    .toolbar {
      background: var(--navy-light);
      padding: 0.8rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid rgba(212, 168, 67, 0.15);
    }

    .search-box {
      background: var(--navy);
      border: 1px solid var(--navy-mid);
      color: var(--white);
      padding: 0.6rem 1rem;
      border-radius: 4px;
      font-size: 0.9rem;
      width: 300px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box:focus { border-color: var(--gold); }

    .filter-btn {
      background: var(--navy);
      border: 1px solid var(--navy-mid);
      color: var(--gray);
      padding: 0.5rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--gold);
      color: var(--gold);
    }

    .flight-count {
      margin-left: auto;
      font-size: 0.8rem;
      color: var(--gray);
    }

    /* ── Flight Board ────────────────────────────── */
    .board-container {
      padding: 1.5rem 2rem;
    }

    .board-header {
      display: grid;
      grid-template-columns: 120px 1fr 100px 1fr 100px 180px 180px 120px 80px;
      gap: 0.5rem;
      padding: 0.8rem 1rem;
      background: var(--navy-mid);
      border-radius: 6px 6px 0 0;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--gold);
      font-weight: 600;
    }

    .board-body {
      background: var(--navy-light);
      border-radius: 0 0 6px 6px;
      overflow: hidden;
    }

    .flight-row {
      display: grid;
      grid-template-columns: 120px 1fr 100px 1fr 100px 180px 180px 120px 80px;
      gap: 0.5rem;
      padding: 0.9rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 0.9rem;
      transition: background 0.3s, opacity 0.5s;
      align-items: center;
    }

    .flight-row:hover {
      background: rgba(212, 168, 67, 0.05);
    }

    .flight-row.updated {
      animation: rowFlash 1.5s ease;
    }

    @keyframes rowFlash {
      0% { background: rgba(212, 168, 67, 0.2); }
      100% { background: transparent; }
    }

    .flight-number {
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 1px;
    }

    .airport-code {
      font-weight: 600;
      font-size: 0.8rem;
      color: var(--gray);
      margin-left: 0.3rem;
    }

    .gate-info {
      font-weight: 600;
    }

    /* ── Status Badge ────────────────────────────── */
    .status-badge {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
      min-width: 90px;
      transition: all 0.4s ease;
    }

    .status-scheduled { background: rgba(127, 140, 141, 0.2); color: var(--gray-status); border: 1px solid var(--gray-status); }
    .status-boarding { background: rgba(241, 196, 15, 0.15); color: var(--yellow); border: 1px solid var(--yellow); }
    .status-departed { background: rgba(52, 152, 219, 0.15); color: var(--blue); border: 1px solid var(--blue); }
    .status-in-flight { background: rgba(52, 152, 219, 0.2); color: #5dade2; border: 1px solid #5dade2; }
    .status-landed { background: rgba(46, 204, 113, 0.15); color: var(--green); border: 1px solid var(--green); }
    .status-delayed { background: rgba(231, 76, 60, 0.15); color: var(--red); border: 1px solid var(--red); }
    .status-cancelled { background: rgba(127, 140, 141, 0.1); color: #95a5a6; border: 1px solid #95a5a6; text-decoration: line-through; }

    /* ── Login Modal ──────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.visible { display: flex; }

    .modal {
      background: var(--navy-light);
      border: 1px solid var(--gold-dim);
      border-radius: 8px;
      padding: 2rem;
      width: 380px;
      max-width: 90vw;
    }

    .modal h2 {
      color: var(--gold);
      margin-bottom: 1.5rem;
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .modal input {
      width: 100%;
      background: var(--navy);
      border: 1px solid var(--navy-mid);
      color: var(--white);
      padding: 0.7rem 1rem;
      border-radius: 4px;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      outline: none;
    }

    .modal input:focus { border-color: var(--gold); }

    .modal button {
      width: 100%;
      background: var(--gold);
      color: var(--navy);
      border: none;
      padding: 0.8rem;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .modal .error-msg {
      color: var(--red);
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }

    /* ── Admin Panel (slide-out) ──────────────────── */
    .admin-panel {
      position: fixed;
      top: 0;
      right: -500px;
      width: 480px;
      height: 100vh;
      background: var(--panel-bg);
      border-left: 2px solid var(--gold);
      z-index: 90;
      transition: right 0.35s ease;
      overflow-y: auto;
      padding: 1.5rem;
    }

    .admin-panel.open { right: 0; }

    .admin-panel h3 {
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .admin-panel .close-btn {
      background: none;
      border: none;
      color: var(--gray);
      font-size: 1.5rem;
      cursor: pointer;
    }

    .admin-flight-card {
      background: var(--navy);
      border: 1px solid var(--navy-mid);
      border-radius: 6px;
      padding: 1rem;
      margin-bottom: 0.8rem;
      transition: border-color 0.2s;
    }

    .admin-flight-card:hover { border-color: var(--gold-dim); }

    .admin-flight-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
    }

    .admin-flight-header .fn {
      font-weight: 700;
      color: var(--gold);
    }

    .admin-flight-header .route {
      font-size: 0.8rem;
      color: var(--gray);
    }

    .admin-controls {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .admin-controls select,
    .admin-controls input {
      background: var(--navy-light);
      border: 1px solid var(--navy-mid);
      color: var(--white);
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      font-size: 0.8rem;
    }

    .admin-controls .save-btn {
      background: var(--gold);
      color: var(--navy);
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.8rem;
    }

    .admin-notes {
      margin-top: 0.5rem;
    }

    .admin-notes textarea {
      width: 100%;
      background: var(--navy-light);
      border: 1px solid var(--navy-mid);
      color: var(--white);
      padding: 0.4rem;
      border-radius: 4px;
      font-size: 0.8rem;
      resize: vertical;
      min-height: 40px;
    }

    .notes-display {
      font-size: 0.8rem;
      color: var(--gray);
      margin-top: 0.3rem;
      padding: 0.3rem 0.5rem;
      background: rgba(255,255,255,0.03);
      border-radius: 3px;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--green);
      color: var(--navy);
      padding: 0.8rem 1.5rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.9rem;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s;
      z-index: 200;
    }

    .toast.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      background: var(--red);
      color: var(--white);
    }

    /* ── Responsive ──────────────────────────────── */
    @media (max-width: 1200px) {
      .board-header, .flight-row {
        grid-template-columns: 100px 1fr 80px 1fr 80px 140px 140px 100px 70px;
        font-size: 0.8rem;
      }
    }

    /* ── Scrollbar ───────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--navy); }
    ::-webkit-scrollbar-thumb { background: var(--navy-mid); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <div>
        <div class="logo">SKYROUTE</div>
        <div class="subtitle">Flight Information Display</div>
      </div>
    </div>
    <div class="header-status">
      <div class="connection-indicator">
        <div class="connection-dot" id="connDot"></div>
        <span id="connText">Disconnected</span>
      </div>
      <div class="clock" id="clock">--:--:--</div>
      <button class="admin-btn" id="adminToggle">Admin</button>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="toolbar">
    <input type="text" class="search-box" id="searchBox" placeholder="Search flights, routes, airports...">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="scheduled">Scheduled</button>
    <button class="filter-btn" data-filter="boarding">Boarding</button>
    <button class="filter-btn" data-filter="departed">Departed</button>
    <button class="filter-btn" data-filter="in-flight">In Flight</button>
    <button class="filter-btn" data-filter="landed">Landed</button>
    <button class="filter-btn" data-filter="delayed">Delayed</button>
    <span class="flight-count" id="flightCount">0 flights</span>
  </div>

  <!-- Flight Board -->
  <div class="board-container">
    <div class="board-header">
      <div>Flight</div>
      <div>Origin</div>
      <div>Gate</div>
      <div>Destination</div>
      <div>Terminal</div>
      <div>Departure</div>
      <div>Arrival</div>
      <div>Status</div>
      <div>Aircraft</div>
    </div>
    <div class="board-body" id="flightBoard">
      <div style="text-align:center; padding:3rem; color:var(--gray);">Connecting to flight data...</div>
    </div>
  </div>

  <!-- Login Modal -->
  <div class="modal-overlay" id="loginModal">
    <div class="modal">
      <h2>Admin Login</h2>
      <div class="error-msg" id="loginError"></div>
      <input type="email" id="loginEmail" placeholder="Email" value="admin@skyroute.com">
      <input type="password" id="loginPassword" placeholder="Password" value="admin123">
      <button id="loginBtn">Sign In</button>
    </div>
  </div>

  <!-- Admin Panel -->
  <div class="admin-panel" id="adminPanel">
    <h3>
      Operations Panel
      <button class="close-btn" id="closeAdmin">&times;</button>
    </h3>
    <div id="adminFlightList"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

<script>
// ─── State ─────────────────────────────────────────────────────────────────
let flights = [];
let authToken = localStorage.getItem('skyroute_token');
let refreshToken = localStorage.getItem('skyroute_refresh');
let currentUser = null;
let ws = null;
let activeFilter = 'all';
let searchTerm = '';
let isRefreshing = false;

// ─── Clock ──────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', {
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  });
}
setInterval(updateClock, 1000);
updateClock();

// ─── WebSocket ──────────────────────────────────────────────────────────────
function connectWebSocket() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${protocol}//${location.host}/ws`);

  ws.onopen = () => {
    console.log('[WS] Connected');
    document.getElementById('connDot').classList.add('connected');
    document.getElementById('connText').textContent = 'Live';
  };

  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);

      if (msg.type === 'FLIGHT_LIST') {
        flights = msg.data;
        renderBoard();
      }

      if (msg.type === 'FLIGHT_UPDATE') {
        const idx = flights.findIndex(f => f.id === msg.data.id);
        if (idx !== -1) {
          flights[idx] = msg.data;
        } else {
          flights.push(msg.data);
        }
        renderBoard();
        highlightRow(msg.data.id);
      }
    } catch (err) {
      console.error('[WS] Parse error:', err);
    }
  };

  ws.onclose = () => {
    console.log('[WS] Disconnected');
    document.getElementById('connDot').classList.remove('connected');
    document.getElementById('connText').textContent = 'Reconnecting...';

    setTimeout(connectWebSocket, 1000);
  };

  ws.onerror = (err) => {
    console.error('[WS] Error:', err);
  };
}

connectWebSocket();

// ─── Render Flight Board ────────────────────────────────────────────────────
function renderBoard() {
  const board = document.getElementById('flightBoard');
  let filtered = flights;

  if (activeFilter !== 'all') {
    filtered = filtered.filter(f => f.status === activeFilter);
  }

  if (searchTerm) {
    const term = searchTerm.toLowerCase();
    filtered = filtered.filter(f =>
      f.flight_number.toLowerCase().includes(term) ||
      f.origin.toLowerCase().includes(term) ||
      f.destination.toLowerCase().includes(term) ||
      f.origin_code.toLowerCase().includes(term) ||
      f.destination_code.toLowerCase().includes(term)
    );
  }

  document.getElementById('flightCount').textContent = `${filtered.length} flight${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    board.innerHTML = '<div style="text-align:center; padding:3rem; color:var(--gray);">No flights match your criteria</div>';
    return;
  }

  board.innerHTML = filtered.map(f => `
    <div class="flight-row" id="row-${f.id}">
      <div class="flight-number">${f.flight_number}</div>
      <div>${f.origin} <span class="airport-code">${f.origin_code}</span></div>
      <div class="gate-info">${f.gate || '—'}</div>
      <div>${f.destination} <span class="airport-code">${f.destination_code}</span></div>
      <div>${f.terminal || '—'}</div>
      <div>${formatTime(f.scheduled_departure)}</div>
      <div>${formatTime(f.scheduled_arrival)}</div>
      <div><span class="status-badge status-${f.status}">${formatStatus(f.status)}</span></div>
      <div style="font-size:0.75rem; color:var(--gray);">${f.aircraft ? f.aircraft.split(' ').slice(-1)[0] : '—'}</div>
    </div>
  `).join('');
}

function formatTime(isoString) {
  if (!isoString) return '—';
  const d = new Date(isoString);
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false }) +
    ' <span style="font-size:0.7rem;color:var(--gray)">' +
    d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + '</span>';
}

function formatStatus(status) {
  return status.replace('-', ' ');
}

function highlightRow(flightId) {
  const row = document.getElementById(`row-${flightId}`);
  if (row) {
    row.classList.remove('updated');
    // Force reflow
    void row.offsetWidth;
    row.classList.add('updated');
  }
}

// ─── Search & Filter ────────────────────────────────────────────────────────
document.getElementById('searchBox').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  renderBoard();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderBoard();
  });
});

// ─── Auth ───────────────────────────────────────────────────────────────────
document.getElementById('adminToggle').addEventListener('click', () => {
  if (authToken) {
    openAdminPanel();
  } else {
    document.getElementById('loginModal').classList.add('visible');
  }
});

document.getElementById('loginModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    e.currentTarget.classList.remove('visible');
  }
});

document.getElementById('loginBtn').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const errorEl = document.getElementById('loginError');

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      errorEl.textContent = data.error || data.message || 'Login failed';
      errorEl.style.display = 'block';
      return;
    }

    authToken = data.token;
    refreshToken = data.refreshToken;
    localStorage.setItem('skyroute_token', authToken);
    localStorage.setItem('skyroute_refresh', refreshToken);
    currentUser = data.user;

    document.getElementById('loginModal').classList.remove('visible');
    document.getElementById('adminToggle').textContent = 'Operations';
    openAdminPanel();
  } catch (err) {
    errorEl.textContent = 'Network error. Please try again.';
    errorEl.style.display = 'block';
  }
});

// ─── Token Refresh ──────────────────────────────────────────────────────────
async function apiCall(url, options = {}) {
  if (!options.headers) options.headers = {};
  if (authToken) options.headers['Authorization'] = `Bearer ${authToken}`;

  let res = await fetch(url, options);

  if (res.status === 401 && refreshToken) {
    const refreshed = await refreshAuthToken();
    if (refreshed) {
      options.headers['Authorization'] = `Bearer ${authToken}`;
      res = await fetch(url, options);
    } else {
      logout();
      return null;
    }
  }

  return res;
}

async function refreshAuthToken() {
  try {
    isRefreshing = true;
    const res = await fetch('/api/auth/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refreshToken })
    });

    if (!res.ok) {
      isRefreshing = false;
      return false;
    }

    const data = await res.json();
    authToken = data.token;
    localStorage.setItem('skyroute_token', authToken);
    isRefreshing = false;
    return true;
  } catch (err) {
    isRefreshing = false;
    return false;
  }
}

function logout() {
  authToken = null;
  refreshToken = null;
  currentUser = null;
  localStorage.removeItem('skyroute_token');
  localStorage.removeItem('skyroute_refresh');
  document.getElementById('adminToggle').textContent = 'Admin';
  document.getElementById('adminPanel').classList.remove('open');
  showToast('Session expired. Please login again.', true);
}

// ─── Admin Panel ────────────────────────────────────────────────────────────
function openAdminPanel() {
  const panel = document.getElementById('adminPanel');
  panel.classList.add('open');
  renderAdminFlights();

  document.getElementById('closeAdmin').addEventListener('click', () => {
    panel.classList.remove('open');
  });
}

function renderAdminFlights() {
  const container = document.getElementById('adminFlightList');
  const statuses = ['scheduled', 'boarding', 'departed', 'in-flight', 'landed', 'delayed', 'cancelled'];

  container.innerHTML = flights.map(f => `
    <div class="admin-flight-card" id="admin-${f.id}">
      <div class="admin-flight-header">
        <span class="fn">${f.flight_number}</span>
        <span class="route">${f.origin_code} → ${f.destination_code}</span>
        <span class="status-badge status-${f.status}" style="font-size:0.65rem;">${formatStatus(f.status)}</span>
      </div>
      <div class="admin-controls">
        <select data-id="${f.id}" class="status-select">
          ${statuses.map(s => `<option value="${s}" ${s === f.status ? 'selected' : ''}>${s.replace('-', ' ')}</option>`).join('')}
        </select>
        <input type="text" placeholder="Gate" value="${f.gate || ''}" data-id="${f.id}" class="gate-input" style="width:60px;">
        <input type="text" placeholder="Terminal" value="${f.terminal || ''}" data-id="${f.id}" class="terminal-input" style="width:70px;">
        <button class="save-btn" onclick="saveFlight('${f.id}')">Update</button>
      </div>
      <div class="admin-notes">
        <textarea data-id="${f.id}" class="notes-input" placeholder="Add operations note...">${f.notes || ''}</textarea>
        ${f.notes ? `<div class="notes-display">${f.notes}</div>` : ''}
      </div>
    </div>
  `).join('');

}

async function saveFlight(flightId) {
  const card = document.getElementById(`admin-${flightId}`);
  const status = card.querySelector('.status-select').value;
  const gate = card.querySelector('.gate-input').value;
  const terminal = card.querySelector('.terminal-input').value;
  const notes = card.querySelector('.notes-input').value;

  const flightIdx = flights.findIndex(f => f.id === flightId);
  const previousState = { ...flights[flightIdx] };

  // Optimistically update UI
  flights[flightIdx].status = status;
  flights[flightIdx].gate = gate;
  flights[flightIdx].terminal = terminal;
  flights[flightIdx].notes = notes;
  renderBoard();
  renderAdminFlights();

  try {
    const res = await apiCall(`/api/admin/flights/${flightId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status, gate, terminal, notes })
    });

    if (!res || !res.ok) {
      showToast('Failed to update flight', true);
      return;
    }

    const data = await res.json();
    showToast(`${data.flight.flight_number} updated successfully`);
  } catch (err) {
    showToast('Network error updating flight', true);
  }
}

// ─── Toast Notifications ────────────────────────────────────────────────────
function showToast(message, isError = false) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = 'toast visible' + (isError ? ' error' : '');
  setTimeout(() => { toast.className = 'toast'; }, 3000);
}

// ─── Init ───────────────────────────────────────────────────────────────────
if (authToken) {
  document.getElementById('adminToggle').textContent = 'Operations';
}
</script>
